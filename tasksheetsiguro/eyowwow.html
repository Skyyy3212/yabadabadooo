<!DOCTYPE html>
<html>
<head>
<title>Message</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
  background: #0a1440;
}


body::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url("cherkawa.jpg") no-repeat center center/cover;
  filter: blur(8px);
  transform: scale(1.1);
  z-index: -1;
}


.box {
  display: none; /* hidden initially */
  background: rgba(0, 0, 0, 0.45);
  padding: 50px;
  border-radius: 12px;
  width: 520px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
  text-align: center;
}


#text {
  line-height: 1.6;
  white-space: pre-line;
  text-align: left;
}


button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  background: #1b2a7a;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #2d3fc4;
}

/* AUDIO POPUP */
#audioBox {
  margin-top: 15px;
  display: none;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body>


<audio id="bgMusic" loop>
  <source src="ambience.mp3" type="audio/mpeg">
</audio>


<button id="openLetterBtn">Open the letter ✉️</button>

<div class="box" id="messageBox">
  <p id="text"></p>
  <button onclick="showAudio()"> I Recommended you to use Headphones 😌🙏🏻</button>
  <div id="audioBox">
    <audio controls>
      <source src="no.mp3" type="audio/mpeg">
      Your browser does not support audio.
    </audio>
  </div>
</div>



<script>
// MESSAGE TEXT
const message = `Hillow hai hai hai, Eliza… 😳
Don’t click the button just yet❗❗❗

Baka napapaisip ka bakit ikaw lang ang pinapabuksan ko nito… I like making special things like this for the people who are really special to me 😎✌🏻✌🏻
But…

You’re not just special—
you’re exceptional,
a different kind of special.

That’s why I made this little HTML thing. I wanted it to be… something unique, something that’s not just words, but a way you could see and hear me.

If thou hast come to read these lines,
then know this moment intertwines
with all the words I’ve kept in still—
unspoken thoughts, a quiet will.
No passing whim, no fleeting view,
but something constant… leading me to you.
So linger here, and you may see
the truth I’ve held, now set free.

Click muh na yung buttonhshshwh.. SURRYY in advance if the voice is a little ewan or ende maayos..😅 
I hope we dont get awkward sa isa't isa ha..`;

let i = 0;
const textElement = document.getElementById("text");

// TYPEWRITER EFFECT
function typeWriter() {
  if (i < message.length) {
    textElement.innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 50);
  }
}

// SHOW AUDIO BUTTON
function showAudio() {
  document.getElementById("audioBox").style.display = "block";
}

// OPEN LETTER BUTTON CLICK
document.getElementById("openLetterBtn").addEventListener("click", function() {
  // Hide the open letter button
  this.style.display = "none";

  // Show message box
  const box = document.getElementById("messageBox");
  box.style.display = "block";

  // Start typewriter
  typeWriter();

  // Start background music
  const bgMusic = document.getElementById("bgMusic");
  bgMusic.volume = 0.09; // low volume
  bgMusic.play();
});
</script>

</body>
</html>
